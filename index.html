<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="http://jamkkanmayo.com" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
    <title>잠깐만요(가제)</title>
  </head>
  <body>
    <main>
      <section class="greeting">
        <h1 class="greeting__title">반가워요</h1>
      </section>
      <section class="stress-check">
        <h2 class="stress-check__title">지금 어때요</h2>
        <div class="mood">
          <p>기분</p>
          <label><input type="radio" name="mood" value="1" /> 😞</label>
          <label><input type="radio" name="mood" value="2" /> 🙁</label>
          <label><input type="radio" name="mood" value="3" /> 😐</label>
          <label><input type="radio" name="mood" value="4" /> 🙂</label>
          <label><input type="radio" name="mood" value="5" /> 😄</label>
        </div>

        <div class="energy">
          <p>에너지</p>
          <label><input type="radio" name="energy" value="1" /> 💤</label>
          <label><input type="radio" name="energy" value="2" /> 😴</label>
          <label><input type="radio" name="energy" value="3" /> 😐</label>
          <label><input type="radio" name="energy" value="4" /> 🙂</label>
          <label><input type="radio" name="energy" value="5" /> ⚡</label>
        </div>
      </section>
      <section class="menu">
        <h3 class="menu__title">해봐요</h3>
        <a href="pages/breathing.html" class="card">
          <div class="card__badge card__badge--guide">가이드</div>
          <h4 class="card__title">4-7-8 호흡 가이드</h4>
          <p class="card__desc">스트레스 해소에 좋은 호흡법</p>
        </a>
      </section>
    </main>
  </body>
</html>
